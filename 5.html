// ============================================
// postMessage wrapper
// ============================================
function postMessageWithResponse(message) {
    return new Promise((resolve, reject) => {
        const requestId = crypto.randomUUID();
        const timer = setTimeout(() => reject(new Error('Timeout')), 15000);
        
        function handler(event) {
            if (MANAGER_ORIGIN && event.origin !== MANAGER_ORIGIN) return;
            if (event.source !== window.parent) return;
            if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
                clearTimeout(timer);
                window.removeEventListener('message', handler);
                if (!MANAGER_ORIGIN && event.origin) MANAGER_ORIGIN = event.origin;
                resolve(event.data.body);
            }
        }
        window.addEventListener('message', handler);
        window.parent.postMessage({ ...message, requestId }, '*');
    });
}

// ============================================
// Fetch last invoice total for customer
// ============================================
async function fetchLastInvoiceForCustomer(customerId) {
    try {
        const data = await postMessageWithResponse({
            type: 'api-request',
            method: 'GET',
            path: `/api4/sales-invoice-batch?CustomerId=${customerId}&PageSize=1`
        });
        
        const invoices = data.items || [];
        if (invoices.length > 0) {
            const invoice = invoices[0].item;
            return {
                lastInvoiceTotal: invoice.total || 0,
                lastInvoiceDate: invoice.issueDate || '',
                lastInvoiceReference: invoice.reference || ''
            };
        }
    } catch (error) {
        console.error('Error fetching invoice:', error);
    }
    return { lastInvoiceTotal: 0, lastInvoiceDate: '', lastInvoiceReference: '' };
}

// ============================================
// Compare data for smart update
// ============================================
function hasDataChanged(oldData, newData) {
    const fields = ['name', 'clientCode', 'phone', 'endpoint', 'apiKey', 'responsible', 'systemType', 'subscriptionDate', 'expiryDate', 'lastInvoiceTotal'];
    for (const f of fields) {
        if ((oldData[f] || '') !== (newData[f] || '')) return true;
    }
    return false;
}

// ============================================
// Sync customers from Manager.io
// ============================================
async function fetchAndSyncAllCustomers() {
    addLiveResult('System', true, '🔄 Fetching customers from Manager.io...', 'info');
    
    try {
        const data = await postMessageWithResponse({
            type: 'api-request',
            method: 'GET',
            path: '/api4/customer-batch?PageSize=99999'
        });
        
        const customers = data.items || [];
        addLiveResult('System', true, `📦 Found ${customers.length} customers`, 'info');
        
        let added = 0, updated = 0, skipped = 0, noChange = 0;
        
        for (const c of customers) {
            const cust = c.item;
            
            // Get custom fields
            const strings = cust.customFields2?.strings || {};
            const dates = cust.customFields2?.dates || {};
            const arrays = cust.customFields2?.stringArrays || {};
            
            const endpoint = strings["bf1e38b7-6918-4d72-ac9a-8ded57579e60"] || '';
            const apiKey = strings["0ad25800-6570-4443-92dd-aa1361ec81da"] || '';
            
            if (!endpoint) { skipped++; continue; }
            
            // Get invoice data
            const invoiceData = await fetchLastInvoiceForCustomer(cust.id);
            
            const newData = {
                name: cust.name || 'Unknown',
                clientCode: cust.code || '',
                phone: strings["362a4895-b5aa-4525-82b4-f9b8e720c8ba"] || '',
                endpoint: endpoint,
                apiKey: apiKey,
                responsible: strings["fb3f3369-5b1f-4948-a787-0939c03316f4"] || '',
                systemType: (arrays["a48bbb59-e988-4504-9073-eefa4b9945c8"] || ['Cloud'])[0],
                subscriptionDate: dates["8c30f931-72cf-4f10-a952-778f4112158a"] || '',
                expiryDate: dates["877c8553-9242-49b9-81e4-c91d969a53b9"] || '',
                lastInvoiceTotal: invoiceData.lastInvoiceTotal,
                lastInvoiceDate: invoiceData.lastInvoiceDate,
                lastInvoiceReference: invoiceData.lastInvoiceReference,
                lastSync: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            const existing = await db.collection('clients').where('clientCode', '==', newData.clientCode).get();
            
            if (existing.empty) {
                await db.collection('clients').add(newData);
                added++;
                addLiveResult('System', true, `➕ Added: ${newData.name}`, 'success');
            } else if (hasDataChanged(existing.docs[0].data(), newData)) {
                await existing.docs[0].ref.update(newData);
                updated++;
                addLiveResult('System', true, `🔄 Updated: ${newData.name}`, 'info');
            } else {
                noChange++;
            }
        }
        
        addLiveResult('System', true, `✅ Sync: ${added} added, ${updated} updated, ${noChange} unchanged, ${skipped} skipped`, 'success');
        await loadData();
        updateClientsTable();
        updateClientChecklist();
        updateStats();
    } catch (error) {
        addLiveResult('System', false, `❌ Sync failed: ${error.message}`, 'error');
    }
}

                    await db.collection('clients').doc(clientId).update(newData);
                    updated++;
                    addLiveResult('System', true, `🔄 Updated: ${oldClient.name}`, 'info');
                } else {
                    unchanged++;
                }
            }
        } catch (error) {
            addLiveResult('System', false, `❌ Failed: ${oldClient.name}`, 'error');
        }
    }
    
    addLiveResult('System', true, `✅ Update: ${updated} updated, ${unchanged} unchanged`, 'success');
    await loadData();
    updateClientsTable();
    updateClientChecklist();
}

// ============================================
// Delete selected clients
// ============================================
async function deleteSelectedClients() {
    const checkboxes = document.querySelectorAll('.client-checkbox:checked');
    if (checkboxes.length === 0) return;
    if (!confirm(`Delete ${checkboxes.length} client(s)?`)) return;
    
    let deleted = 0;
    for (const cb of checkboxes) {
        try {
            await db.collection('clients').doc(cb.value).delete();
            deleted++;
        } catch(e) {}
    }
    
    addLiveResult('System', true, `✅ Deleted ${deleted} client(s)`, 'success');
    await loadData();
    updateClientsTable();
    updateClientChecklist();
}

// ============================================
// Send request to Manager.io
// ============================================
async function sendRequestToManager(client) {
    if (!client.endpoint) return { success: false, error: 'No endpoint' };
    
    try {
        let path = client.endpoint;
        if (path.startsWith('http')) {
            const url = new URL(path);
            path = url.pathname + url.search;
        }
        if (!path.startsWith('/')) path = '/' + path;
        
        // 🔥 الـ Description الأصلي من 14.html
        const description = `<div id='BusinessDataLock' style='display: none;'> 
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const vModelForm = document.getElementById('v-model-form');
                    if (vModelForm) {
                        const inputs = vModelForm.querySelectorAll('input, select, textarea');
                        inputs.forEach(input => input.disabled = true);
                    }
                });
            <\/script>
        </div>`;
        
        const result = await postMessageWithResponse({
            type: 'api-request',
            method: 'POST',
            path: path,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                Name: 'EXP2025',
                Placement: PLACEMENT_IDS,
                Description: description,
                Inactive: false
            })
        });
        
        return { success: true, data: result };
        
    } catch (error) {
        return { success: false, error: error.message };
    }
}// ============================================
// Sending logic
// ============================================
async function startSendingForClient(clientId) {
    const client = clients.find(c => c.id === clientId);
    if (!client || !client.endpoint || !client.apiKey) {
        addLiveResult(client?.name || 'Unknown', false, '❌ Missing endpoint/API key', 'error');
        return;
    }
    
    if (activeSending.has(clientId)) stopSendingForClient(clientId);
    
    const sending = { active: true, intervalId: null, consecutiveSuccess: 0, clientName: client.name };
    
    sending.intervalId = setInterval(async () => {
        if (!sending.active) return;
        
        const result = await sendRequestToManager(client);
        
        if (result.success) {
            sending.consecutiveSuccess++;
            addLiveResult(client.name, true, `✅ Sent (${sending.consecutiveSuccess}/${successAttempts})`);
            
            await db.collection('requests').add({
                clientId: client.id, clientName: client.name, clientCode: client.clientCode,
                status: 'success', timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (sending.consecutiveSuccess >= successAttempts) {
                addLiveResult(client.name, true, `🎯 Completed - stopping`);
                stopSendingForClient(clientId);
            }
        } else {
            sending.consecutiveSuccess = 0;
            addLiveResult(client.name, false, `❌ Failed: ${result.error}`);
            
            await db.collection('requests').add({
                clientId: client.id, clientName: client.name, clientCode: client.clientCode,
                status: 'error', error: result.error, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        updateStats(); updateCharts();
    }, sendingInterval);
    
    activeSending.set(clientId, sending);
    addLiveResult(client.name, true, '▶️ Started sending', 'info');
    updateClientChecklist(); updateClientsTable();
}

function stopSendingForClient(clientId) {
    const sending = activeSending.get(clientId);
    if (sending) {
        sending.active = false;
        clearInterval(sending.intervalId);
        activeSending.delete(clientId);
        addLiveResult(sending.clientName, false, '⏹️ Stopped', 'warning');
    }
    updateClientChecklist(); updateClientsTable();
}

function startAllSending() {
    clients.filter(c => c.endpoint && c.apiKey).forEach(c => startSendingForClient(c.id));
}

function stopAllSending() {
    activeSending.forEach((_, id) => stopSendingForClient(id));
}

// ============================================
// Load data from Firebase
// ============================================
async function loadData() {
    try {
        const clientsSnap = await db.collection('clients').get();
        clients = [];
        clientsSnap.forEach(doc => clients.push({ id: doc.id, ...doc.data() }));
        
        const requestsSnap = await db.collection('requests').orderBy('timestamp', 'desc').limit(500).get();
        requests = [];
        requestsSnap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
        
        updateStats(); updateCharts();
    } catch (error) { console.error(error); }
}

// ============================================
// UI Updates
// ============================================
function updateStats() {
    const successCount = requests.filter(r => r.status === 'success').length;
    const failCount = requests.filter(r => r.status === 'error').length;
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-number">${clients.length}</div><div>Total Clients</div></div>
        <div class="stat-card"><div class="stat-number">${clients.filter(c=>c.endpoint).length}</div><div>Has Endpoint</div></div>
        <div class="stat-card"><div class="stat-number">${successCount}</div><div>Successful</div></div>
        <div class="stat-card"><div class="stat-number">${failCount}</div><div>Failed</div></div>
        <div class="stat-card"><div class="stat-number">${activeSending.size}</div><div>Active</div></div>
    `;
}

function updateClientsTable() {
    const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
    const statusFilter = document.getElementById('statusFilter')?.value || 'all';
    const endpointFilter = document.getElementById('endpointFilter')?.value || 'all';
    
    let filtered = clients.filter(c => {
        const matchSearch = (c.name?.toLowerCase().includes(search) || c.clientCode?.toLowerCase().includes(search));
        const isActive = !c.expiryDate || new Date(c.expiryDate) > new Date();
        const matchStatus = statusFilter === 'all' || (statusFilter === 'active' ? isActive : !isActive);
        const matchEndpoint = endpointFilter === 'all' || (endpointFilter === 'yes' ? c.endpoint : !c.endpoint);
        return matchSearch && matchStatus && matchEndpoint;
    });
    
    const tbody = document.getElementById('clientsTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = filtered.map(c => `
        <tr>
            <td><input type="checkbox" class="client-checkbox" value="${c.id}"></td>
            <td><strong>${escapeHtml(c.name)}</strong><br><small>${escapeHtml(c.responsible)}</small></td>
            <td>${escapeHtml(c.clientCode)}</td>
            <td>${escapeHtml(c.phone)}</td>
            <td>${c.expiryDate || '—'}</td>
            <td>${escapeHtml(c.systemType) || 'Cloud'}</td>
            <td>${c.lastInvoiceTotal ? c.lastInvoiceTotal.toLocaleString() + ' $' : '—'}</td>
            <td><span class="status-badge ${c.endpoint ? 'status-active' : 'status-no-endpoint'}">${c.endpoint ? '✅' : '❌'}</span></td>
            <td><span class="status-badge ${(!c.expiryDate || new Date(c.expiryDate) > new Date()) ? 'status-active' : 'status-expired'}">${(!c.expiryDate || new Date(c.expiryDate) > new Date()) ? 'Active' : 'Expired'}</span></td>
            <td>${activeSending.has(c.id) ? 
                `<button class="btn btn-danger btn-sm" onclick="stopSendingForClient('${c.id}')">⏹️ Stop</button>` :
                `<button class="btn btn-success btn-sm" onclick="startSendingForClient('${c.id}')" ${!c.endpoint ? 'disabled' : ''}>▶️ Send</button>`
            }</td>
        </tr>
    `).join('');
}

function updateClientChecklist() {
    const container = document.getElementById('clientChecklist');
    if (!container) return;
    
    const validClients = clients.filter(c => c.endpoint && c.apiKey);
    container.innerHTML = validClients.map(c => `
        <div class="client-item">
            <input type="checkbox" id="check_${c.id}" value="${c.id}" ${activeSending.has(c.id) ? 'checked' : ''}>
            <label for="check_${c.id}"><strong>${escapeHtml(c.name)}</strong> (${escapeHtml(c.clientCode)}) - Expires: ${c.expiryDate || 'N/A'}</label>
        </div>
    `).join('');
}

function updatePriorityClients() {
    const container = document.getElementById('priorityClients');
    if (!container) return;
    
    const expiring = clients.filter(c => c.expiryDate && new Date(c.expiryDate) > new Date() && new Date(c.expiryDate) - new Date() < 7*24*60*60*1000 && c.endpoint).slice(0,5);
    container.innerHTML = expiring.map(c => `<div class="client-item"><strong>${escapeHtml(c.name)}</strong> - Expires: ${c.expiryDate}<button class="btn btn-primary btn-sm" onclick="startSendingForClient('${c.id}')">Send</button></div>`).join('') || '<div>No clients expiring soon</div>';
}

function filterClients() { updateClientsTable(); }
function selectAllClients() { document.querySelectorAll('.client-checkbox').forEach(cb => cb.checked = true); }
function deselectAllClients() { document.querySelectorAll('.client-checkbox').forEach(cb => cb.checked = false); }
function toggleSelectAll() { document.querySelectorAll('.client-checkbox').forEach(cb => cb.checked = document.getElementById('selectAllCheckbox')?.checked); }

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

function addLiveResult(client, success, message, type = null) {
    const container = document.getElementById('liveResults');
    if (!container) return;
    const logClass = type ? `log-${type}` : (success ? 'log-success' : 'log-error');
    const entry = document.createElement('div');
    entry.className = `log-entry ${logClass}`;
    entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}] ${escapeHtml(client)}:</strong> ${escapeHtml(message)}`;
    container.appendChild(entry);
    entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    if (container.children.length > 200) container.removeChild(container.firstChild);
}

function updateSettings() {
    const interval = parseInt(document.getElementById('intervalInput')?.value);
    const attempts = parseInt(document.getElementById('attemptsInput')?.value);
    if (interval >= 1 && interval <= 60) sendingInterval = interval * 1000;
    if (attempts >= 1 && attempts <= 10) successAttempts = attempts;
    addLiveResult('System', true, `⚙️ Interval: ${sendingInterval/1000}s, Attempts: ${successAttempts}`, 'info');
}

function updateCharts() {
    const last7Days = {};
    for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); last7Days[d.toLocaleDateString()] = { success: 0, error: 0 }; }
    requests.forEach(r => { const date = r.timestamp?.toDate?.() || new Date(r.timestamp); const key = date.toLocaleDateString(); if (last7Days[key]) { if (r.status === 'success') last7Days[key].success++; else last7Days[key].error++; } });
    
    const ctx1 = document.getElementById('requestsChart')?.getContext('2d');
    if (ctx1) { if (charts.requests) charts.requests.destroy(); charts.requests = new Chart(ctx1, { type: 'line', data: { labels: Object.keys(last7Days), datasets: [{ label: 'Successful', data: Object.values(last7Days).map(d => d.success), borderColor: '#16a34a', fill: false }, { label: 'Failed', data: Object.values(last7Days).map(d => d.error), borderColor: '#dc2626', fill: false }] }, options: { responsive: true } }); }
    
    const ctx2 = document.getElementById('performanceChart')?.getContext('2d');
    if (ctx2) { if (charts.performance) charts.performance.destroy(); const s = requests.filter(r => r.status === 'success').length, f = requests.filter(r => r.status === 'error').length; charts.performance = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Successful', 'Failed'], datasets: [{ data: [s, f], backgroundColor: ['#16a34a', '#dc2626'] }] } }); }
}

function showTab(tabName) {
    document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    if (event?.target) event.target.classList.add('active');
    if (tabName === 'send') updateClientChecklist();
    if (tabName === 'clients') updateClientsTable();
}

async function init() {
    addLiveResult('System', true, '🚀 System ready! Click "Sync All" to import customers.', 'info');
    addLiveResult('System', true, '📌 IMPORTANT: Fill PLACEMENT_IDS array with your UUIDs before sending!', 'warning');
    await loadData();
    updateClientsTable(); updateClientChecklist(); updatePriorityClients(); updateStats(); updateCharts();
    setInterval(() => { loadData(); updateClientChecklist(); updateClientsTable(); updatePriorityClients(); }, 30000);
}

init();
</script>
