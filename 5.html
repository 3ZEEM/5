<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sync Customers to Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: system-ui; padding: 20px; background: #f8fafc; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        button { background: #1d6fcf; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .success { background: #dcfce7; color: #15803d; padding: 10px; border-radius: 6px; }
        .error { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 6px; }
        .loading { background: #fff3cd; color: #856404; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 Customers from Manager.io</h2>
    <button onclick="fetchCustomers()">🔄 Fetch Customers</button>
    <div id="result"></div>
    <div id="customersTable"></div>
</div>

<script>
// Firebase config (test project)
const firebaseConfig = {
    apiKey: "AIzaSyAEHL9LHEVf3alSIbomrUAiXR7bbaoB2hE",
    authDomain: "test-e6f8e.firebaseapp.com",
    projectId: "test-e6f8e",
    storageBucket: "test-e6f8e.firebasestorage.app",
    messagingSenderId: "435354240397",
    appId: "1:435354240397:web:4a159450b23500491269c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ============================================
// postMessage wrapper (same as working index.html)
// ============================================
let MANAGER_ORIGIN = null;

function postMessageWithResponse(message) {
    return new Promise((resolve, reject) => {
        const requestId = crypto.randomUUID();
        const timer = setTimeout(() => {
            window.removeEventListener('message', handler);
            reject(new Error('Timeout — Manager.io did not respond'));
        }, 15000);
        
        function handler(event) {
            if (MANAGER_ORIGIN && event.origin !== MANAGER_ORIGIN) return;
            if (event.source !== window.parent) return;
            if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
                clearTimeout(timer);
                window.removeEventListener('message', handler);
                if (!MANAGER_ORIGIN && event.origin) MANAGER_ORIGIN = event.origin;
                resolve(event.data.body);
            }
        }
        
        window.addEventListener('message', handler);
        window.parent.postMessage({ ...message, requestId }, '*');
    });
}

// ============================================
// Fetch all customers from Manager.io
// ============================================
async function fetchCustomers() {
    const resultDiv = document.getElementById('result');
    const tableDiv = document.getElementById('customersTable');
    
    resultDiv.innerHTML = '<div class="loading">🔄 Fetching customers from Manager.io...</div>';
    tableDiv.innerHTML = '';
    
    try {
        // Fetch all customers using the batch endpoint
        const data = await postMessageWithResponse({
            type: 'api-request',
            method: 'GET',
            path: '/api4/customer-batch?PageSize=99999'
        });
        
        const customers = data.items || [];
        
        if (customers.length === 0) {
            resultDiv.innerHTML = '<div class="error">❌ No customers found</div>';
            return;
        }
        
        resultDiv.innerHTML = `<div class="success">✅ Found ${customers.length} customers</div>`;
        
        // Build table
        let html = `
            <table>
                <thead>
                    <tr><th>Name</th><th>Code</th><th>Phone</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
        `;
        
        for (const c of customers) {
            const customer = c.item;
            const name = customer.name || '—';
            const code = customer.code || '—';
            const phone = customer.customFields2?.strings?.["362a4895-b5aa-4525-82b4-f9b8e720c8ba"] || '—';
            const status = customer.inactive ? 'Inactive' : 'Active';
            
            html += `
                <tr>
                    <td>${name}</td>
                    <td>${code}</td>
                    <td>${phone}</td>
                    <td>${status}</td>
                    <td><button onclick="syncToFirebase('${customer.id}', '${name.replace(/'/g, "\\'")}', '${code}')">📤 Sync</button></td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        tableDiv.innerHTML = html;
        
    } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ Failed: ${error.message}</div>`;
    }
}

// ============================================
// Sync single customer to Firebase
// ============================================
async function syncToFirebase(customerId, name, code) {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `<div class="loading">🔄 Syncing ${name} to Firebase...</div>`;
    
    try {
        await db.collection('clients').add({
            customerId: customerId,
            name: name,
            clientCode: code,
            syncedAt: firebase.firestore.FieldValue.serverTimestamp(),
            source: "manager-extension"
        });
        
        resultDiv.innerHTML = `<div class="success">✅ ${name} synced to Firebase successfully!</div>`;
        
        // Refresh the table to show synced status (optional)
        fetchCustomers();
        
    } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ Failed to sync ${name}: ${error.message}</div>`;
    }
}
</script>
</body>
</html>
